version: "3.9"

# Optional observability stack for running the demo against real backends.
# Not required to run the agents — the mock tools work standalone.
#
# Usage:
#   docker compose up -d
#   open http://localhost:3000   # Grafana, admin/admin
#   open http://localhost:9090   # Prometheus

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: mao-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: mao-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    depends_on:
      - prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.0
    container_name: mao-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
